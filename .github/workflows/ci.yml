# CI for the GLM-5.2 (UD-Q4_K_XL) accelerator -- the Q4_K track.
#
# Jobs:
#   python-selftests : the pure-Python golden/reference self-tests (numpy only,
#                      no EDA tools): q4k_ref / glm_model_q4k_ref / ckpt_pack_q4k
#   eda              : `make all` -- the extended fast prove-it gate (unittests +
#                      synth-glm + formal + model-q4k-smoke + resident +
#                      resident-equiv + full-elab)
#   formal           : `make formal` standalone -- the 9 yosys-smtbmc + z3 BMC
#                      runs of the memory-system controllers
#
# TOOLCHAIN PIN rationale: ubuntu's apt iverilog is 11.x, which lacks
# $bitstoshortreal -- the Q4_K TBs need iverilog >= 13.  YosysHQ's
# setup-oss-cad-suite@v3 with a DATED release pins the whole
# iverilog/yosys/yosys-smtbmc/z3 stack in one reproducible bundle.  Release
# 2025-12-28 (tag verified to exist) is a nightly of the tools' masters, so it
# ships yosys >= 0.60 (yosys v0.60 was released 2025-12-03) and an
# iverilog-13-line build -- both satisfy the repo's floors (yosys >= 0.56,
# iverilog >= 13).  Local verified baseline: iverilog 13.0 (stable),
# yosys 0.66, z3 4.16.0, python 3.12 + numpy.

name: ci

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  python-selftests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install python deps
        run: python -m pip install --upgrade numpy
      - name: Q4_K ggml-reference golden selftest (q4k_ref)
        run: python3 tools/q4k_ref.py
      - name: Assembled-model numpy golden selftest (glm_model_q4k_ref)
        run: python3 tools/glm_model_q4k_ref.py
      - name: GGUF pack round-trip + footprint-guard selftest (ckpt_pack_q4k)
        run: python3 tools/ckpt_pack_q4k.py

  eda:
    runs-on: ubuntu-latest
    # `make all` is LONG: measured locally (M-series mac), the bf16 glm_model
    # full-forward TB inside `unittests` alone takes 39 min wall, the unittests
    # TBs before it ~28 min, and synth-glm ~18 min -- so the whole gate is
    # roughly 1.5-2 h locally and slower on a hosted runner [EST].  360 is the
    # hosted-runner job maximum.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          # resident-equiv runs `git show 05639bf:src/glm_q4k_system.v` (the
          # pre-RESIDENT golden); a shallow clone would not have that commit.
          fetch-depth: 0
      # The suite tarball is hundreds of MB and setup-oss-cad-suite has no
      # built-in caching (it extracts to $RUNNER_TEMP/oss-cad-suite and adds
      # bin/ to PATH -- verified in its src/main.ts). Cache the extracted dir
      # keyed by the pinned release: the version pin doubles as the cache key.
      - name: Cache OSS CAD Suite
        id: cache-eda-suite
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/oss-cad-suite
          key: oss-cad-suite-2025-12-28-${{ runner.os }}
      - name: Install OSS CAD Suite (iverilog + yosys + yosys-smtbmc + z3)
        if: steps.cache-eda-suite.outputs.cache-hit != 'true'
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: '2025-12-28'
      - name: Add cached OSS CAD Suite to PATH
        if: steps.cache-eda-suite.outputs.cache-hit == 'true'
        run: echo "${{ runner.temp }}/oss-cad-suite/bin" >> "$GITHUB_PATH"
      # setup-python AFTER the suite so `python3` for the Makefile's
      # tools/*.py generators resolves to a numpy-capable interpreter
      # (yosys-smtbmc uses the suite's own bundled python regardless).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install python deps
        run: python -m pip install --upgrade numpy
      - name: Tool versions
        run: |
          iverilog -V 2>&1 | head -1
          yosys --version
          z3 --version
          python3 --version
      - name: make all (unittests + synth-glm + formal + model-q4k-smoke + resident + resident-equiv + full-elab)
        run: make all

  formal:
    runs-on: ubuntu-latest
    # `make formal` measured ~2.3 min wall locally; 30 covers a slower runner
    # plus the toolchain download.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Cache OSS CAD Suite
        id: cache-formal-suite
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/oss-cad-suite
          key: oss-cad-suite-2025-12-28-${{ runner.os }}
      - name: Install OSS CAD Suite (yosys + yosys-smtbmc + z3)
        if: steps.cache-formal-suite.outputs.cache-hit != 'true'
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: '2025-12-28'
      - name: Add cached OSS CAD Suite to PATH
        if: steps.cache-formal-suite.outputs.cache-hit == 'true'
        run: echo "${{ runner.temp }}/oss-cad-suite/bin" >> "$GITHUB_PATH"
      - name: Tool versions
        run: |
          yosys --version
          z3 --version
      - name: Bounded model checking (9 BMC runs; 7 controllers + PF=1 mode + ECC pager datapath)
        run: make formal
      # `make formal-ind` (unbounded k-induction) is deliberately NOT wired:
      # neither the Makefile nor docs/FORMAL.md documents its expected runtime,
      # and its connect-bind harnesses (FLASH_IND_CONN / DDR5_IND_CONN) are
      # validated against yosys 0.66 while this pinned suite ships a ~0.60-era
      # yosys.  Run `make formal-ind` locally (it is part of `release-gate`).
